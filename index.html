<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Fall: A Game of Endings — List Builder</title>
<link href="./style.css" rel="stylesheet"/>
</head>
<body>
<header class="header">
<div class="header__title">
<h1>Fall: A Game of Endings</h1>
<p class="subtitle">Army List Builder (prototype)</p>
</div>
<div class="header__controls">
<a class="btn headerLink" href="./charts.html" target="_blank" rel="noopener noreferrer">Quick Reference</a>
<label class="control">
<span>Game Size</span>
<select id="pointsLimit"></select>
</label>
<label class="control">
<span>Faction</span>
<select id="factionSelect"></select>
</label>
</div>
</header>
<main class="layout">
<section class="panel">
<div class="panel__header">
<h2>Units</h2>
<p class="muted" id="unitHelp">Select a faction to see units.</p>
</div>
<div class="list" id="unitList"></div>
</section>
<section class="panel">
<div class="panel__header rosterHeader">
<div>
<h2>Current Roster</h2>
<p class="muted" id="rosterSummary">0 / 200</p>
</div>
<div class="rosterActions">
<button class="btn" id="copyBtn">Copy to clipboard</button>
<button class="btn btn--ghost" id="clearBtn">Clear</button>
</div>
</div>
<div class="list" id="rosterList"></div>
<div class="totalBar">
<div class="totalBar__left">
<div aria-hidden="true" class="statusDot" id="statusDot"></div>
<span id="statusText">Ready.</span>
</div>
<div class="totalBar__right">
<span class="totalLabel">Total</span>
<span class="totalValue" id="totalPoints">0</span>
</div>
</div>
</section>

<section class="panel">
<div class="panel__header">
<h2>Unit Profiles</h2>
<p class="muted" id="profileHelp">Add units to your roster to see profiles here (duplicates dedupe; shows Qty).</p>
</div>
<div class="list profiles" id="profileList"></div>
</section>
</main>
<footer class="footer">
<span class="muted">Prototype: fixed unit costs, duplicates allowed.</span>
</footer>
<script src="./app.js"></script>
</body>
</html>
